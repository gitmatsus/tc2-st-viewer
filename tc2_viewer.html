function switchMode(mode){
  const isCompare=(mode==='compare');
  comparisonMode=isCompare;
  document.getElementById('modeView').classList.toggle('active',!isCompare);
  document.getElementById('modeCompare').classList.toggle('active',isCompare);
  // Toggle visibility
  document.getElementById('sidebar').style.display=isCompare?'none':'';
  document.getElementById('editorArea').style.display=isCompare?'none':'';
  document.getElementById('cmpContainer').classList.toggle('active',isCompare);
  document.getElementById('tabBar').style.display=isCompare?'none':'';
  document.getElementById('btnOpenSingle').style.display=isCompare?'none':'';
  document.getElementById('cmpDiffNav').style.display=isCompare?'flex':'none';
  if(isCompare&&typeof updateCmpDropOverlay==='function') updateCmpDropOverlay();
  // Re-run search to update count/highlights for the active mode
  if(document.getElementById('searchInput').value) runSearch();
  else updateCount();
}

function loadCmpFile(event, which){
  const file=event.target.files[0];
  if(!file) return;
  event.target.value='';
  readProFileBlob(file,(parsed,name)=>{
    if(which===1){
      file1Data={tree:parsed.tree,pous:parsed.pous,filename:name};
      document.getElementById('cmpFile1Name').textContent=name;
    }else{
      file2Data={tree:parsed.tree,pous:parsed.pous,filename:name};
      document.getElementById('cmpFile2Name').textContent=name;
    }
    _diffCache.clear();
    showToast('📂 '+name+' を読み込みました');
    if(typeof updateCmpDropOverlay==='function') updateCmpDropOverlay();
    if(file1Data&&file2Data) runComparison();
  });
}

function runComparison(){
  cmpTreeResult=comparePouTrees(file1Data,file2Data);
  renderCmpTree();
  // Auto-select first modified item, or first item
  const first=cmpTreeResult.find(r=>r.status==='modified')||cmpTreeResult[0];
  if(first) selectCmpPou(first.name);
}

function renderCmpTree(){
  const el=document.getElementById('cmpTree');
  if(!cmpTreeResult||!cmpTreeResult.length){el.innerHTML='<div class="cmp-empty">比較結果なし</div>';return;}
  const statusLabel={modified:'変更',added:'追加',deleted:'削除',unchanged:'同一'};
  const statusIcon={modified:'~',added:'+',deleted:'-',unchanged:'='};
  // Compute hits per POU from navigation matches (Layer 1)
  const hitsPerPou={};
  for(const m of cmpSearchMatches) hitsPerPou[m.pouName]=(hitsPerPou[m.pouName]||0)+1;

  // Group results by section then folder
  const sections={POUs:{},Resources:{}};
  for(const r of cmpTreeResult){
    const sec=r.section||'POUs';
    const folder=r.folder||'__root__';
    if(!sections[sec]) sections[sec]={};
    if(!sections[sec][folder]) sections[sec][folder]=[];
    sections[sec][folder].push(r);
  }

  function cmpFileHtml(r,inFolder){
    const safeName=esc(r.name).replace(/'/g,"\\'");
    const cls='cmp-tree-item'+(inFolder?' in-folder':'')+(r.name===cmpSelectedPou?' active':'');
    const hits=hitsPerPou[r.name]||0;
    const isRes=r.section==='Resources';
    return `<div class="${cls}" onclick="selectCmpPou('${safeName}')">
      ${!isRes?'<span class="prg-badge">PRG</span>':''}
      <span class="cmp-name">${esc(r.name)}</span>
      ${hits>0?`<span class="cmp-hit-badge">${hits}</span>`:''}
      <span class="cmp-status cmp-status-${r.status}">${statusIcon[r.status]} ${statusLabel[r.status]}${r.status==='modified'&&r.diffCount>0?' ('+r.diffCount+')':''}</span>
    </div>`;
  }

  let h='';
  for(const [secName,folders] of Object.entries(sections)){
    const items=Object.values(folders).flat();
    if(!items.length) continue;
    h+=`<div class="sidebar-section">
      <div class="sidebar-header open" onclick="toggleSection(this)">
        <span class="arrow">▶</span>${secName}
      </div><div class="tree-body">`;
    // Root items (no folder)
    if(folders['__root__']) for(const r of folders['__root__']) h+=cmpFileHtml(r,false);
    // Folder items
    for(const [fn,files] of Object.entries(folders)){
      if(fn==='__root__') continue;
      h+=`<div class="tree-folder"><span>📁</span>${esc(fn)}</div>`;
      for(const r of files) h+=cmpFileHtml(r,true);
    }
    h+=`</div></div>`;
  }
  el.innerHTML=h;
}

function selectCmpPou(name){
  cmpSelectedPou=name;
  renderCmpTree();
  renderCmpCode(name);
  buildCmpDiffBlocks();
  // Rebuild highlight data for new POU (matches are already computed for all POUs)
  if(document.getElementById('searchInput').value){
    cmpBuildHighlightData();
    cmpReRenderPanes();
  }
}

function renderCmpCode(name){
  const code1=(file1Data&&file1Data.pous[name])||'';
  const code2=(file2Data&&file2Data.pous[name])||'';
  const sp1=splitPouContent(code1);
  const sp2=splitPouContent(code2);

  // Diff for declaration parts
  const declLines1=sp1.decl?sp1.decl.split('\n'):[];
  const declLines2=sp2.decl?sp2.decl.split('\n'):[];
  const declAligned=getDiffAligned(declLines1,declLines2);

  // Diff for implementation parts
  const implLines1=sp1.impl?sp1.impl.split('\n'):[];
  const implLines2=sp2.impl?sp2.impl.split('\n'):[];
  const implAligned=getDiffAligned(implLines1,implLines2);

  // Save display data for search
  cmpDisplayData={
    cmpDeclHl1:declAligned.display1, cmpDeclHl2:declAligned.display2,
    cmpImplHl1:implAligned.display1, cmpImplHl2:implAligned.display2
  };

  // Render all 4 panes
  renderCmpPane('cmpDeclHl1','cmpDeclLn1',declAligned.display1);
  renderCmpPane('cmpDeclHl2','cmpDeclLn2',declAligned.display2);
  renderCmpPane('cmpImplHl1','cmpImplLn1',implAligned.display1);
  renderCmpPane('cmpImplHl2','cmpImplLn2',implAligned.display2);

  // Setup scroll sync
  setupCmpScrollSync('cmpDeclScroll1','cmpDeclScroll2');
  setupCmpScrollSync('cmpImplScroll1','cmpImplScroll2');
  hookCmpDiffMapScroll();

  // Show/hide impl row
  const hasImpl=(implLines1.length>0||implLines2.length>0);
  document.getElementById('cmpImplRow').style.display=hasImpl?'':'none';
  document.getElementById('cmpResizer').style.display=hasImpl?'':'none';
  if(!hasImpl){
    document.getElementById('cmpDeclRow').style.flex='1';
    document.getElementById('cmpDeclRow').style.height='auto';
  }else{
    document.getElementById('cmpDeclRow').style.flex='';
    document.getElementById('cmpDeclRow').style.height='';
  }
  // Draw diff map after layout settles
  requestAnimationFrame(()=>renderCmpDiffMap());
}

// ============================================================
// Diff map bars (per-section minimap on right edge)
// ============================================================
const CMP_DIFFMAP_SECTIONS=[
  {canvasId:'cmpDiffMapDecl',scrollId:'cmpDeclScroll1',hlId:'cmpDeclHl1'},
  {canvasId:'cmpDiffMapImpl',scrollId:'cmpImplScroll1',hlId:'cmpImplHl1'}
];
const CMP_DIFFMAP_COLORS={mod:'#efcb05',del:'#ff7b72',add:'#56d364',placeholder:'rgba(86,211,100,0.5)'};

function renderCmpDiffMap(){
  for(const sec of CMP_DIFFMAP_SECTIONS) renderCmpDiffMapSection(sec);
}

function renderCmpDiffMapSection(sec){
  const canvas=document.getElementById(sec.canvasId);
  if(!canvas) return;
  const row=canvas.parentElement;
  if(!row||row.style.display==='none'||row.offsetHeight<1) return;

  const dpr=window.devicePixelRatio||1;
  const w=14, h=row.offsetHeight;
  canvas.width=w*dpr;
  canvas.height=h*dpr;
  canvas.style.width=w+'px';
  canvas.style.height=h+'px';
  const ctx=canvas.getContext('2d');
  ctx.scale(dpr,dpr);
  ctx.clearRect(0,0,w,h);

  const lines=cmpDisplayData[sec.hlId]||[];
  if(!lines.length) return;
  const lineH=h/lines.length;

  // Draw diff lines
  for(let i=0;i<lines.length;i++){
    const c=CMP_DIFFMAP_COLORS[lines[i].type];
    if(!c) continue;
    ctx.fillStyle=c;
    ctx.fillRect(0,i*lineH,w,Math.max(lineH,1));
  }

  // Draw viewport indicator
  const scrollEl=document.getElementById(sec.scrollId);
  const hlEl=document.getElementById(sec.hlId);
  if(scrollEl&&hlEl){
    const contentH=hlEl.scrollHeight||1;
    const viewH=scrollEl.clientHeight;
    const scrollTop=scrollEl.scrollTop;
    const vpTop=(scrollTop/contentH)*h;
    const vpH=Math.max((viewH/contentH)*h,6);
    ctx.fillStyle='rgba(100,140,200,0.35)';
    ctx.fillRect(0,vpTop,w,vpH);
    ctx.strokeStyle='rgba(100,140,200,0.6)';
    ctx.lineWidth=1;
    ctx.strokeRect(0.5,vpTop+0.5,w-1,vpH-1);
  }
}

// Click + drag handler for each diff map canvas
(function initCmpDiffMapDrag(){
  document.addEventListener('DOMContentLoaded',()=>{
    for(const sec of CMP_DIFFMAP_SECTIONS){
      const canvas=document.getElementById(sec.canvasId);
      if(!canvas) continue;

      function makeScrollFn(s){
        return function(clientY){
          const rect=canvas.getBoundingClientRect();
          const y=clientY-rect.top;
          const h=canvas.offsetHeight;
          if(h<1) return;
          const ratio=Math.max(0,Math.min(1,y/h));
          const scrollEl=document.getElementById(s.scrollId);
          const hlEl=document.getElementById(s.hlId);
          if(scrollEl&&hlEl){
            const contentH=hlEl.scrollHeight;
            const viewH=scrollEl.clientHeight;
            scrollEl.scrollTop=Math.max(0,ratio*contentH-viewH/2);
          }
        };
      }
      const scrollToY=makeScrollFn(sec);

      canvas.addEventListener('mousedown',e=>{
        e.preventDefault();
        scrollToY(e.clientY);
        function onMove(ev){scrollToY(ev.clientY);}
        function onUp(){
          document.removeEventListener('mousemove',onMove);
          document.removeEventListener('mouseup',onUp);
        }
        document.addEventListener('mousemove',onMove);
        document.addEventListener('mouseup',onUp);
      });
    }
  });
})();

// Update diff map on scroll
function hookCmpDiffMapScroll(){
  for(const sec of CMP_DIFFMAP_SECTIONS){
    const el=document.getElementById(sec.scrollId);
    if(el&&!el._diffMapHooked){
      el.addEventListener('scroll',()=>renderCmpDiffMapSection(sec));
      el._diffMapHooked=true;
    }
  }
}

function renderCmpPane(hlId, lnId, displayLines){
  const hlEl=document.getElementById(hlId);
  const lnEl=document.getElementById(lnId);
  // Build search highlight map from cmpHighlightData (Layer 2)
  const highlights=cmpHighlightData[hlId]||[];
  const searchMap=new Map();
  for(const h of highlights){
    if(!searchMap.has(h.displayIdx)) searchMap.set(h.displayIdx,[]);
    const isCur=!!cmpCurMatchDisplay&&cmpCurMatchDisplay.paneId===hlId&&cmpCurMatchDisplay.displayIdx===h.displayIdx&&cmpCurMatchDisplay.start===h.start&&cmpCurMatchDisplay.end===h.end;
    searchMap.get(h.displayIdx).push({start:h.start,end:h.end,isCur});
  }
  const htmlParts=[];
  const lnParts=[];
  for(let di=0;di<displayLines.length;di++){
    const d=displayLines[di];
    const cls=d.type==='placeholder'?'diff-line-placeholder':
              d.type==='mod'?'diff-line-mod':
              d.type==='del'?'diff-line-del':
              d.type==='add'?'diff-line-add':'';
    let lineHtml;
    if(d.type==='placeholder'){
      lineHtml='<span style="opacity:0">.</span>';
    }else{
      const marks=searchMap.get(di)||[];
      if(!marks.length){
        lineHtml=hlLine(d.content);
      }else{
        const sorted=[...marks].sort((a,b)=>a.start-b.start);
        const parts=[];let pos=0;
        for(const mk of sorted){
          if(mk.start<pos) continue;
          if(mk.start>pos) parts.push({text:d.content.slice(pos,mk.start),type:'plain'});
          parts.push({text:d.content.slice(mk.start,mk.end),type:mk.isCur?'cur':'search'});
          pos=mk.end;
        }
        if(pos<d.content.length) parts.push({text:d.content.slice(pos),type:'plain'});
        lineHtml=parts.map(p=>{
          if(p.type==='plain') return hlLine(p.text);
          if(p.type==='cur') return `<span class="search-cur-hl">${esc(p.text)}</span>`;
          return `<span class="search-hl">${esc(p.text)}</span>`;
        }).join('');
      }
    }
    htmlParts.push(cls?`<div class="${cls}">${lineHtml}</div>`:`<div>${lineHtml}</div>`);
    if(d.type==='placeholder'){
      lnParts.push(`<div class="cmp-line-num" style="opacity:0">.</div>`);
    }else{
      lnParts.push(`<div class="cmp-line-num">${d.lineNum}</div>`);
    }
  }
  hlEl.innerHTML=htmlParts.join('');
  lnEl.innerHTML=lnParts.join('');
}

let _cmpSyncPairs={};
function setupCmpScrollSync(id1, id2){
  const key=id1+'_'+id2;
  // Clean up previous handlers
  if(_cmpSyncPairs[key]){
    const old=_cmpSyncPairs[key];
    old.el1.removeEventListener('scroll',old.h1);
    old.el2.removeEventListener('scroll',old.h2);
  }
  const el1=document.getElementById(id1);
  const el2=document.getElementById(id2);
  let syncing=false;
  const h1=()=>{if(syncing)return;syncing=true;el2.scrollTop=el1.scrollTop;el2.scrollLeft=el1.scrollLeft;syncing=false;};
  const h2=()=>{if(syncing)return;syncing=true;el1.scrollTop=el2.scrollTop;el1.scrollLeft=el2.scrollLeft;syncing=false;};
  el1.addEventListener('scroll',h1);
  el2.addEventListener('scroll',h2);
  _cmpSyncPairs[key]={el1,el2,h1,h2};
}

// ============================================================
// Comparison mode click tracking (side switching)
// ============================================================
let cmpClickStartPos=null; // {pouName, section, localLineIdx, col} - click position for search continuation
let cmpDiffBlocks=[];   // [{section:'decl'|'impl', displayIdx:number}] diff block start positions in current POU
let cmpDiffCurIdx=-1;   // current diff block index

function onCmpCodeClick(e){
  const hlEl=e.target.closest('.cmp-highlight');
  if(!hlEl) return;
  const paneId=hlEl.id;
  if(!CMP_PANES_SET.has(paneId)) return;

  // Extract side and section from paneId
  const newSide=paneId.endsWith('1')?'left':'right';
  const isDecl=paneId.startsWith('cmpDecl');
  const section=isDecl?'decl':'impl';

  // Calculate click position (line index in display data)
  const hlRect=hlEl.getBoundingClientRect();
  const scrollEl=hlEl.parentElement; // cmp-code-scroll
  const relY=e.clientY-hlRect.top;

  // Use computed line height from CSS (font-size:12px * line-height:1.6)
  const cs=getComputedStyle(hlEl);
  const fontSize=parseFloat(cs.fontSize)||12;
  const lineH=parseFloat(cs.lineHeight)||(fontSize*1.6);
  // Account for padding-top of .cmp-highlight (8px)
  const padTop=parseFloat(cs.paddingTop)||8;
  const displayIdx=Math.floor((relY-padTop)/lineH);

  // Get display data and convert to raw position
  const dl=cmpDisplayData[paneId];
  if(dl && displayIdx>=0 && displayIdx<dl.length && dl[displayIdx].type!=='placeholder'){
    const displayLine=dl[displayIdx];
    // Calculate column position (approximate, based on character width)
    const padLeft=parseFloat(cs.paddingLeft)||12;
    const relX=e.clientX-hlRect.left-padLeft+(scrollEl?scrollEl.scrollLeft:0);
    const charWidth=fontSize*0.6; // approximate monospace character width
    const col=Math.max(0,Math.floor(relX/charWidth));

    // Store click position for search continuation
    cmpClickStartPos={
      pouName: cmpSelectedPou,
      section: section,
      localLineIdx: displayLine.lineNum-1, // convert to 0-based
      col: col
    };
  }

  // Handle side switching (no scroll — scroll happens on F3/F2)
  if(newSide!==cmpActiveSide){
    cmpActiveSide=newSide;
    const q=document.getElementById('searchInput').value;
    if(q) runCmpSearch(true);   // rebuild matches + highlight, but skip scroll
    else updateCmpSideIndicator();
  }
}

// ============================================================
// Comparison mode search
// ============================================================
const CMP_PANES=['cmpDeclHl1','cmpDeclHl2','cmpImplHl1','cmpImplHl2'];
const CMP_PANES_SET=new Set(CMP_PANES);
const CMP_SCROLL_MAP={cmpDeclHl1:'cmpDeclScroll1',cmpDeclHl2:'cmpDeclScroll2',cmpImplHl1:'cmpImplScroll1',cmpImplHl2:'cmpImplScroll2'};
const CMP_LN_MAP={cmpDeclHl1:'cmpDeclLn1',cmpDeclHl2:'cmpDeclLn2',cmpImplHl1:'cmpImplLn1',cmpImplHl2:'cmpImplLn2'};
let cmpCurMatchDisplay=null; // {paneId, displayIdx, start, end} current match mapped to display

// -- Helper functions --

function findAllInText(text,q){
  const results=[];
  if(optWord){
    const re=new RegExp('\\b'+escRe(q)+'\\b',optCase?'g':'gi');
    let m;
    while((m=re.exec(text))!==null) results.push({start:m.index,end:m.index+m[0].length});
  }else{
    const src=optCase?text:text.toLowerCase();
    const term=optCase?q:q.toLowerCase();
    let idx=0;
    while(true){
      const f=src.indexOf(term,idx);if(f<0)break;
      results.push({start:f,end:f+term.length});
      idx=f+1;
    }
  }
  return results;
}

function cmpFindInLine_raw(line,q,li,pouName,section){
  const matches=findAllInText(line,q);
  for(const m of matches){
    cmpSearchMatches.push({pouName,section,localLineIdx:li,start:m.start,end:m.end});
  }
}

function cmpGetActivePanes(){
  if(cmpActiveSide==='left') return {decl:'cmpDeclHl1',impl:'cmpImplHl1'};
  return {decl:'cmpDeclHl2',impl:'cmpImplHl2'};
}

function cmpBuildHighlightData(){
  cmpHighlightData={};
  const q=document.getElementById('searchInput').value;
  if(!q||q.length<1||!cmpSelectedPou) return;
  for(const pane of CMP_PANES){
    const dl=cmpDisplayData[pane];
    if(!dl) continue;
    const hits=[];
    for(let di=0;di<dl.length;di++){
      if(dl[di].type==='placeholder') continue;
      const lineMatches=findAllInText(dl[di].content,q);
      for(const m of lineMatches) hits.push({displayIdx:di,start:m.start,end:m.end});
    }
    if(hits.length) cmpHighlightData[pane]=hits;
  }
}

function cmpMapRawToDisplay(match){
  const panes=cmpGetActivePanes();
  const paneId=match.section==='decl'?panes.decl:panes.impl;
  const dl=cmpDisplayData[paneId];
  if(!dl) return null;
  const targetLineNum=match.localLineIdx+1;
  for(let di=0;di<dl.length;di++){
    if(dl[di].lineNum===targetLineNum) return {paneId,displayIdx:di};
  }
  return null;
}

function cmpFindStartIdx(){
  if(!cmpSearchMatches.length) return -1;

  // If click position is set, find the first match from that position onward
  if(cmpClickStartPos){
    const {pouName, section, localLineIdx, col} = cmpClickStartPos;
    // First, find matches in the same section starting from the clicked line
    for(let i=0; i<cmpSearchMatches.length; i++){
      const m=cmpSearchMatches[i];
      if(m.pouName===pouName && m.section===section){
        if(m.localLineIdx>localLineIdx ||
           (m.localLineIdx===localLineIdx && m.start>=col)){
          return i;
        }
      }
    }
    // If not found in same section, find in other section of same POU
    for(let i=0; i<cmpSearchMatches.length; i++){
      const m=cmpSearchMatches[i];
      if(m.pouName===pouName){
        return i;
      }
    }
  }

  // Default: find first match in current POU, otherwise first match overall
  const idx=cmpSearchMatches.findIndex(m=>m.pouName===cmpSelectedPou);
  if(idx>=0) return idx;
  return 0;
}

// Reverse version: find last match BEFORE click position (for Shift+F3)
function cmpFindStartIdxReverse(){
  if(!cmpSearchMatches.length) return -1;

  if(cmpClickStartPos){
    const {pouName, section, localLineIdx, col} = cmpClickStartPos;
    // Find last match in same section before click position
    for(let i=cmpSearchMatches.length-1; i>=0; i--){
      const m=cmpSearchMatches[i];
      if(m.pouName===pouName && m.section===section){
        if(m.localLineIdx<localLineIdx ||
           (m.localLineIdx===localLineIdx && m.start<col)){
          return i;
        }
      }
    }
    // If not found, find last match in same POU
    for(let i=cmpSearchMatches.length-1; i>=0; i--){
      if(cmpSearchMatches[i].pouName===pouName) return i;
    }
  }

  // Default: last match in current POU, otherwise last match overall
  for(let i=cmpSearchMatches.length-1; i>=0; i--){
    if(cmpSearchMatches[i].pouName===cmpSelectedPou) return i;
  }
  return cmpSearchMatches.length-1;
}

function updateCmpSideIndicator(){
  const headers=document.querySelectorAll('.cmp-file-header');
  const q=document.getElementById('searchInput').value;
  if(headers[0]) headers[0].classList.toggle('cmp-search-active',!!q&&cmpActiveSide==='left');
  if(headers[1]) headers[1].classList.toggle('cmp-search-active',!!q&&cmpActiveSide==='right');
}

// -- Main search function (Layer 1 + Layer 2) --

function runCmpSearch(skipScroll){
  const q=document.getElementById('searchInput').value;
  cmpSearchMatches=[];cmpSearchCurIdx=-1;cmpHighlightData={};

  if(q.length>=1&&cmpTreeResult){
    // Layer 1: Search active side's RAW code across all POUs
    const fileData=cmpActiveSide==='left'?file1Data:file2Data;
    if(fileData){
      for(const r of cmpTreeResult){
        const code=fileData.pous[r.name]||'';
        if(!code) continue;
        const sp=splitPouContent(code);
        if(sp.decl){
          const declLines=sp.decl.split('\n');
          for(let li=0;li<declLines.length;li++) cmpFindInLine_raw(declLines[li],q,li,r.name,'decl');
        }
        if(sp.impl){
          const implLines=sp.impl.split('\n');
          for(let li=0;li<implLines.length;li++) cmpFindInLine_raw(implLines[li],q,li,r.name,'impl');
        }
      }
    }
    if(cmpSearchMatches.length>0) cmpSearchCurIdx=cmpFindStartIdx();
    // Consume click position when search scrolls (F2/input); keep it for F3 if skipScroll
    if(!skipScroll) cmpClickStartPos=null;
    // Layer 2: Highlight data for current POU (both sides)
    cmpBuildHighlightData();
  }

  updateCmpSideIndicator();
  updateCount();
  renderCmpTree();
  cmpReRenderPanes();
  if(!skipScroll && cmpSearchCurIdx>=0) cmpScrollToMatch();
}

function cmpReRenderPanes(){
  // Compute current match display position for highlight
  cmpCurMatchDisplay=null;
  if(cmpSearchCurIdx>=0){
    const m=cmpSearchMatches[cmpSearchCurIdx];
    if(m&&m.pouName===cmpSelectedPou){
      const mapped=cmpMapRawToDisplay(m);
      if(mapped) cmpCurMatchDisplay={paneId:mapped.paneId,displayIdx:mapped.displayIdx,start:m.start,end:m.end};
    }
  }
  for(const pane of CMP_PANES){
    const dl=cmpDisplayData[pane];
    if(dl) renderCmpPane(pane,CMP_LN_MAP[pane],dl);
  }
}

// -- Navigation (POU-crossing) --

function cmpNeedReanchor(){
  if(cmpSearchCurIdx<0) return false;
  const cur=cmpSearchMatches[cmpSearchCurIdx];
  if(!cur) return false;
  return cur.pouName!==cmpSelectedPou;
}

function cmpReanchor(forward){
  if(!cmpTreeResult) return;
  const pouIdx=cmpTreeResult.findIndex(r=>r.name===cmpSelectedPou);
  if(forward){
    const idx=cmpSearchMatches.findIndex(m=>m.pouName===cmpSelectedPou);
    if(idx>=0){cmpSearchCurIdx=idx;return;}
    for(let pi=pouIdx+1;pi<cmpTreeResult.length;pi++){
      const ni=cmpSearchMatches.findIndex(m=>m.pouName===cmpTreeResult[pi].name);
      if(ni>=0){cmpSearchCurIdx=ni;return;}
    }
    cmpSearchCurIdx=0;
  }else{
    let lastIdx=-1;
    for(let i=cmpSearchMatches.length-1;i>=0;i--){
      if(cmpSearchMatches[i].pouName===cmpSelectedPou){lastIdx=i;break;}
    }
    if(lastIdx>=0){cmpSearchCurIdx=lastIdx;return;}
    for(let pi=pouIdx-1;pi>=0;pi--){
      for(let i=cmpSearchMatches.length-1;i>=0;i--){
        if(cmpSearchMatches[i].pouName===cmpTreeResult[pi].name){cmpSearchCurIdx=i;return;}
      }
    }
    cmpSearchCurIdx=cmpSearchMatches.length-1;
  }
}

function cmpNextMatch(){
  if(!cmpSearchMatches.length) return;
  // If click position is set, jump to the first match after that position
  if(cmpClickStartPos){
    const startIdx=cmpFindStartIdx();
    cmpClickStartPos=null; // consume click position
    if(startIdx>=0){cmpSearchCurIdx=startIdx;cmpJumpTo();return;}
  }
  if(cmpNeedReanchor()){cmpReanchor(true);cmpJumpTo();return;}
  cmpSearchCurIdx=(cmpSearchCurIdx+1)%cmpSearchMatches.length;
  cmpJumpTo();
}

function cmpPrevMatch(){
  if(!cmpSearchMatches.length) return;
  // If click position is set, jump to the last match before that position
  if(cmpClickStartPos){
    const startIdx=cmpFindStartIdxReverse();
    cmpClickStartPos=null; // consume click position
    if(startIdx>=0){cmpSearchCurIdx=startIdx;cmpJumpTo();return;}
  }
  if(cmpNeedReanchor()){cmpReanchor(false);cmpJumpTo();return;}
  cmpSearchCurIdx=(cmpSearchCurIdx-1+cmpSearchMatches.length)%cmpSearchMatches.length;
  cmpJumpTo();
}

function cmpJumpTo(){
  if(cmpSearchCurIdx<0) return;
  const m=cmpSearchMatches[cmpSearchCurIdx];
  if(!m) return;
  // Switch POU if needed
  if(m.pouName!==cmpSelectedPou){
    cmpSelectedPou=m.pouName;
    renderCmpTree();
    renderCmpCode(m.pouName);
    cmpBuildHighlightData();
  }
  updateCount();
  cmpReRenderPanes();
  requestAnimationFrame(()=>cmpScrollToMatch());
}

function cmpScrollToMatch(){
  if(cmpSearchCurIdx<0) return;
  const m=cmpSearchMatches[cmpSearchCurIdx];
  if(!m) return;
  const mapped=cmpMapRawToDisplay(m);
  if(!mapped) return;
  const scrollId=CMP_SCROLL_MAP[mapped.paneId];
  const scroll=document.getElementById(scrollId);
  const hl=document.getElementById(mapped.paneId);
  if(!scroll||!hl) return;
  const dl=cmpDisplayData[mapped.paneId];
  const lineCount=dl?dl.length:1;
  const lh=lineCount>0?hl.scrollHeight/lineCount:20;
  const targetY=mapped.displayIdx*lh;
  const viewH=scroll.clientHeight;
  if(targetY<scroll.scrollTop+40||targetY+lh>scroll.scrollTop+viewH-40){
    scroll.scrollTop=Math.max(0,targetY-viewH/3);
  }
}

// ============================================================
// Comparison mode: diff block navigation (▲▼ jump)
// ============================================================
function buildCmpDiffBlocks(){
  cmpDiffBlocks=[];
  cmpDiffCurIdx=-1;
  if(!cmpSelectedPou||!cmpDisplayData) return;

  // Scan decl and impl sections — a diff block = consecutive non-match lines
  const sectionConfigs=[
    {section:'decl', hl1:'cmpDeclHl1', hl2:'cmpDeclHl2'},
    {section:'impl', hl1:'cmpImplHl1', hl2:'cmpImplHl2'}
  ];
  for(const sc of sectionConfigs){
    const dl1=cmpDisplayData[sc.hl1]||[];
    const dl2=cmpDisplayData[sc.hl2]||[];
    const len=Math.max(dl1.length,dl2.length);
    let inBlock=false;
    for(let i=0;i<len;i++){
      const t1=dl1[i]?dl1[i].type:'placeholder';
      const t2=dl2[i]?dl2[i].type:'placeholder';
      const isDiff=(t1!=='match'||t2!=='match');
      if(isDiff&&!inBlock){
        cmpDiffBlocks.push({section:sc.section, displayIdx:i});
        inBlock=true;
      }else if(!isDiff){
        inBlock=false;
      }
    }
  }
  // Update count display
  const countEl=document.getElementById('cmpDiffCount');
  if(countEl) countEl.textContent=cmpDiffBlocks.length>0?cmpDiffBlocks.length+'箇所':'';
}

function cmpNextDiff(){
  if(!cmpDiffBlocks.length) return;
  if(cmpClickStartPos){
    // Find first diff block after click position
    const clickSection=cmpClickStartPos.section;
    const clickLine=cmpClickStartPos.localLineIdx;
    cmpClickStartPos=null;
    // Map click localLineIdx to displayIdx
    const clickDisplayIdx=cmpMapClickToDisplayIdx(clickSection,clickLine);
    let found=-1;
    for(let i=0;i<cmpDiffBlocks.length;i++){
      const b=cmpDiffBlocks[i];
      if(b.section===clickSection&&b.displayIdx>clickDisplayIdx){found=i;break;}
      if(b.section==='impl'&&clickSection==='decl'){found=i;break;}
    }
    if(found<0) found=0; // wrap around
    cmpDiffCurIdx=found;
  }else{
    cmpDiffCurIdx=(cmpDiffCurIdx+1)%cmpDiffBlocks.length;
  }
  cmpScrollToDiffBlock(cmpDiffCurIdx);
}

function cmpPrevDiff(){
  if(!cmpDiffBlocks.length) return;
  if(cmpClickStartPos){
    // Find last diff block before click position
    const clickSection=cmpClickStartPos.section;
    const clickLine=cmpClickStartPos.localLineIdx;
    cmpClickStartPos=null;
    const clickDisplayIdx=cmpMapClickToDisplayIdx(clickSection,clickLine);
    let found=-1;
    for(let i=cmpDiffBlocks.length-1;i>=0;i--){
      const b=cmpDiffBlocks[i];
      if(b.section===clickSection&&b.displayIdx<clickDisplayIdx){found=i;break;}
      if(b.section==='decl'&&clickSection==='impl'){found=i;break;}
    }
    if(found<0) found=cmpDiffBlocks.length-1; // wrap around
    cmpDiffCurIdx=found;
  }else{
    cmpDiffCurIdx=(cmpDiffCurIdx-1+cmpDiffBlocks.length)%cmpDiffBlocks.length;
  }
  cmpScrollToDiffBlock(cmpDiffCurIdx);
}

function cmpMapClickToDisplayIdx(section,localLineIdx){
  // Map localLineIdx (raw 0-based) to displayIdx in active side pane
  const paneId=(section==='decl'?'cmpDeclHl':'cmpImplHl')+(cmpActiveSide==='left'?'1':'2');
  const dl=cmpDisplayData[paneId]||[];
  for(let i=0;i<dl.length;i++){
    if(dl[i].lineNum&&dl[i].lineNum-1>=localLineIdx) return i;
  }
  return dl.length-1;
}

function cmpScrollToDiffBlock(blockIdx){
  if(blockIdx<0||blockIdx>=cmpDiffBlocks.length) return;
  const block=cmpDiffBlocks[blockIdx];
  // Determine scroll container and highlight element
  const isDecl=block.section==='decl';
  const scrollEl=document.getElementById(isDecl?'cmpDeclScroll1':'cmpImplScroll1');
  const hlEl=document.getElementById(isDecl?'cmpDeclHl1':'cmpImplHl1');
  if(!scrollEl||!hlEl) return;
  const dl=cmpDisplayData[isDecl?'cmpDeclHl1':'cmpImplHl1']||[];
  const lineCount=dl.length||1;
  const lh=lineCount>0?hlEl.scrollHeight/lineCount:20;
  const targetY=block.displayIdx*lh;
  const viewH=scrollEl.clientHeight;
  scrollEl.scrollTop=Math.max(0,targetY-viewH/3);
  // Update count display to show current position
  const countEl=document.getElementById('cmpDiffCount');
  if(countEl) countEl.textContent=(blockIdx+1)+'/'+cmpDiffBlocks.length+'箇所';
}

// ============================================================
// Init
// ============================================================
if(PROJECT_DATA){
  const _ff=Object.values(PROJECT_DATA.tree)[0];
  activeTabId=Object.values(_ff).flat()[0];
  buildTabs();buildSidebar();renderCode(activeTabId);
  hideEmptyState();
}else{
  buildSidebar();
  showEmptyState();
}
